<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏威夷除蟲達人 — 餌站巡檢填報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0f4f8;color:#333;min-height:100vh}
.header{background:#1F4E79;color:white;padding:20px 24px}
.header h1{font-size:18px;font-weight:bold}
.header p{font-size:12px;opacity:.75;margin-top:4px}
.container{max-width:560px;margin:0 auto;padding:20px 16px}

.card{background:white;border-radius:12px;border:1px solid #e0e0e0;padding:20px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:bold;color:#1F4E79;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:bold}
.field select, .field textarea, .field input[type=date]{
  width:100%;padding:11px 14px;border:1px solid #ccc;border-radius:8px;
  font-size:14px;font-family:sans-serif;background:white;color:#333;
  appearance:none;-webkit-appearance:none;
}
.field select:focus, .field textarea:focus, .field input[type=date]:focus{
  outline:none;border-color:#1F4E79;box-shadow:0 0 0 3px rgba(31,78,121,.1)
}
.field textarea{resize:vertical;min-height:80px}

.radio-group{display:flex;flex-direction:column;gap:8px}
.radio-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;transition:all .15s}
.radio-option:hover{border-color:#1F4E79;background:#f5f9ff}
.radio-option.selected{border-color:#1F4E79;background:#EBF3FB}
.radio-option input[type=radio]{width:16px;height:16px;accent-color:#1F4E79;cursor:pointer}
.radio-option span{font-size:14px}
.status-normal{color:#2e7d32}
.status-refill{color:#e65100}
.status-abnormal{color:#c62828}
.rat-none{color:#2e7d32}
.rat-found{color:#c62828}

.photo-area{border:2px dashed #ccc;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.photo-area:hover{border-color:#1F4E79;background:#f5f9ff}
.photo-area input{display:none}
.photo-area .icon{font-size:32px;margin-bottom:8px}
.photo-area p{font-size:13px;color:#888}
.photo-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.photo-previews img{width:80px;height:70px;object-fit:cover;border-radius:6px;border:1px solid #ddd}

.btn-submit{width:100%;background:#1F4E79;color:white;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn-submit:hover{background:#163d61}
.btn-submit:disabled{background:#aaa;cursor:not-allowed}

.step-indicator{display:flex;gap:6px;margin-bottom:20px}
.step{flex:1;height:4px;border-radius:2px;background:#ddd;transition:background .3s}
.step.active{background:#1F4E79}
.step.done{background:#4caf50}

.success-screen{display:none;text-align:center;padding:40px 20px}
.success-screen .icon{font-size:60px;margin-bottom:16px}
.success-screen h2{font-size:20px;font-weight:bold;color:#1F4E79;margin-bottom:8px}
.success-screen p{font-size:14px;color:#666;margin-bottom:24px}
.btn-reset{background:#1F4E79;color:white;border:none;padding:12px 28px;border-radius:8px;font-size:14px;cursor:pointer}

.msg-error{background:#fdecea;color:#c62828;border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:12px;display:none}
.msg-loading{background:#e3f2fd;color:#1565c0;border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:12px;display:none}

.required{color:#c62828;margin-left:2px}
</style>
</head>
<body>

<div class="header">
  <h1>🐀 夏威夷除蟲達人</h1>
  <p>餌站巡檢填報系統</p>
</div>

<div class="container">

  <!-- 進度條 -->
  <div class="step-indicator">
    <div class="step active" id="step1"></div>
    <div class="step" id="step2"></div>
    <div class="step" id="step3"></div>
  </div>

  <div id="errorMsg" class="msg-error"></div>
  <div id="loadingMsg" class="msg-loading">⏳ 提交中，請稍候...</div>

  <!-- 填報表單 -->
  <div id="formArea">

    <!-- 卡片1：基本資訊 -->
    <div class="card">
      <h2>📍 基本資訊</h2>

      <div class="field">
        <label>巡檢地點 <span class="required">*</span></label>
        <select id="location" onchange="onLocationChange()">
          <option value="">-- 請選擇地點 --</option>
          <option value="高雄市私立慈善園老人養護中心">高雄市私立慈善園老人養護中心</option>
          <option value="櫻島居酒屋">櫻島居酒屋</option>
          <option value="東新餐飲">東新餐飲</option>
          <option value="愛貓一生實業股份有限公司">愛貓一生實業股份有限公司</option>
          <option value="通寶清運有限公司">通寶清運有限公司</option>
        </select>
      </div>

      <div class="field">
        <label>餌站編號 <span class="required">*</span></label>
        <select id="station">
          <option value="">-- 請先選擇地點 --</option>
        </select>
      </div>

      <div class="field">
        <label>巡檢日期 <span class="required">*</span></label>
        <input type="date" id="date">
      </div>
    </div>

    <!-- 卡片2：巡檢狀況 -->
    <div class="card">
      <h2>🔍 巡檢狀況</h2>

      <div class="field">
        <label>餌料狀況 <span class="required">*</span></label>
        <div class="radio-group" id="baitGroup">
          <label class="radio-option" onclick="selectRadio('bait','normal',this)">
            <input type="radio" name="bait" value="正常">
            <span class="status-normal">✅ 正常</span>
          </label>
          <label class="radio-option" onclick="selectRadio('bait','refill',this)">
            <input type="radio" name="bait" value="已消耗需補充">
            <span class="status-refill">🔄 已消耗需補充</span>
          </label>
          <label class="radio-option" onclick="selectRadio('bait','abnormal',this)">
            <input type="radio" name="bait" value="異常">
            <span class="status-abnormal">⚠️ 異常</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label>鼠跡發現 <span class="required">*</span></label>
        <div class="radio-group" id="ratGroup">
          <label class="radio-option" onclick="selectRadio('rat','none',this)">
            <input type="radio" name="rat" value="無">
            <span class="rat-none">✅ 無</span>
          </label>
          <label class="radio-option" onclick="selectRadio('rat','light',this)">
            <input type="radio" name="rat" value="有（輕微）">
            <span class="rat-found">⚠️ 有（輕微）</span>
          </label>
          <label class="radio-option" onclick="selectRadio('rat','heavy',this)">
            <input type="radio" name="rat" value="有（明顯）">
            <span class="rat-found">🚨 有（明顯）</span>
          </label>
        </div>
      </div>
    </div>

    <!-- 卡片3：處理說明與照片 -->
    <div class="card">
      <h2>📝 處理說明與照片</h2>

      <div class="field">
        <label>處理說明</label>
        <textarea id="notes" placeholder="例：補充餌料、清理周邊環境、發現鼠糞已清除..."></textarea>
      </div>

      <div class="field">
        <label>現場照片（最多3張）</label>
        <div class="photo-area" onclick="document.getElementById('photoInput').click()">
          <input type="file" id="photoInput" accept="image/*" multiple onchange="previewPhotos(this)">
          <div class="icon">📷</div>
          <p>點此拍照或選擇圖片</p>
        </div>
        <div class="photo-previews" id="photoPreviews"></div>
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitForm()">✅ 送出巡檢報告</button>

  </div>

  <!-- 成功畫面 -->
  <div class="success-screen" id="successScreen">
    <div class="icon">✅</div>
    <h2>巡檢報告已送出！</h2>
    <p id="successMsg"></p>
    <button class="btn-reset" onclick="resetForm()">繼續填寫下一筆</button>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = "【填入你的Apps Script部署網址】";

// 各地點餌站數量設定
const STATION_COUNTS = {
  "高雄市私立慈善園老人養護中心": 9,
  "櫻島居酒屋": 2,
  "東新餐飲": 2,
  "愛貓一生實業股份有限公司": 16,
  "通寶清運有限公司": 6
};

let selectedBait = "";
let selectedRat  = "";
let photoFiles   = [];

// 設定預設日期為今天
document.getElementById("date").value = new Date().toISOString().split("T")[0];

// 地點選擇後更新餌站選項
function onLocationChange() {
  const loc     = document.getElementById("location").value;
  const stSel   = document.getElementById("station");
  const count   = STATION_COUNTS[loc] || 0;

  stSel.innerHTML = '<option value="">-- 請選擇餌站 --</option>';
  for (let i = 1; i <= count; i++) {
    const num = String(i).padStart(2,"0");
    const opt = document.createElement("option");
    opt.value = "A-" + num;
    opt.textContent = "A-" + num;
    stSel.appendChild(opt);
  }

  // 更新進度條
  updateSteps();
}

// 單選按鈕選取
function selectRadio(group, val, el) {
  document.querySelectorAll(`input[name="${group}"]`).forEach(r => {
    r.closest(".radio-option").classList.remove("selected");
  });
  el.classList.add("selected");
  if (group === "bait") selectedBait = el.querySelector("input").value;
  if (group === "rat")  selectedRat  = el.querySelector("input").value;
  updateSteps();
}

// 照片預覽
function previewPhotos(input) {
  const files = Array.from(input.files).slice(0, 3);
  photoFiles  = files;
  const prev  = document.getElementById("photoPreviews");
  prev.innerHTML = "";
  files.forEach(f => {
    const img = document.createElement("img");
    img.src   = URL.createObjectURL(f);
    prev.appendChild(img);
  });
}

// 更新進度條
function updateSteps() {
  const loc  = document.getElementById("location").value;
  const stat = document.getElementById("station").value;
  const date = document.getElementById("date").value;
  document.getElementById("step1").className = "step " + (loc ? "done" : "active");
  document.getElementById("step2").className = "step " + (stat && date ? "done" : (loc ? "active" : ""));
  document.getElementById("step3").className = "step " + (selectedBait && selectedRat ? "done" : (stat && date ? "active" : ""));
}

// 送出表單
async function submitForm() {
  const loc   = document.getElementById("location").value;
  const stat  = document.getElementById("station").value;
  const date  = document.getElementById("date").value;
  const notes = document.getElementById("notes").value.trim();
  const errEl = document.getElementById("errorMsg");
  const lodEl = document.getElementById("loadingMsg");

  errEl.style.display = "none";

  // 驗證
  if (!loc)         { showError("請選擇巡檢地點"); return; }
  if (!stat)        { showError("請選擇餌站編號"); return; }
  if (!date)        { showError("請選擇巡檢日期"); return; }
  if (!selectedBait){ showError("請選擇餌料狀況"); return; }
  if (!selectedRat) { showError("請選擇鼠跡發現狀況"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  lodEl.style.display = "block";
  lodEl.textContent   = "⏳ 提交中，請稍候...";

  try {
    // 上傳照片到 Apps Script（base64）
    const photoData = [];
    for (const f of photoFiles) {
      const b64 = await toBase64(f);
      photoData.push({ name: f.name, type: f.type, data: b64 });
    }

    const payload = {
      action: "submitRecord",
      location: loc,
      station:  stat,
      date:     date,
      baitStatus: selectedBait,
      ratSign:    selectedRat,
      notes:      notes,
      photos:     photoData
    };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });

    // no-cors 模式無法讀取回傳值，直接視為成功
    const data = { ok: true };

    lodEl.style.display = "none";

    if (data.ok) {
      document.getElementById("formArea").style.display    = "none";
      document.getElementById("successScreen").style.display = "block";
      document.getElementById("successMsg").textContent =
        loc + "　" + stat + "　" + date + "\n已成功記錄！";
    } else {
      showError("送出失敗：" + data.msg);
      btn.disabled = false;
    }
  } catch(e) {
    lodEl.style.display = "none";
    showError("網路連線失敗，請稍後再試");
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent    = "⚠ " + msg;
  el.style.display  = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("讀取失敗"));
    r.readAsDataURL(file);
  });
}

function resetForm() {
  document.getElementById("location").value  = "";
  document.getElementById("station").innerHTML = '<option value="">-- 請先選擇地點 --</option>';
  document.getElementById("date").value      = new Date().toISOString().split("T")[0];
  document.getElementById("notes").value     = "";
  document.getElementById("photoPreviews").innerHTML = "";
  document.querySelectorAll(".radio-option").forEach(el => el.classList.remove("selected"));
  document.querySelectorAll("input[type=radio]").forEach(el => el.checked = false);
  selectedBait = ""; selectedRat = ""; photoFiles = [];
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("errorMsg").style.display  = "none";
  document.getElementById("formArea").style.display  = "block";
  document.getElementById("successScreen").style.display = "none";
  document.getElementById("step1").className = "step active";
  document.getElementById("step2").className = "step";
  document.getElementById("step3").className = "step";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
</body>
</html>
